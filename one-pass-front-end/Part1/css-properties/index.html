<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reset-css@5.0.1/reset.css">
  <link rel="stylesheet" href="./css/main.css">
  <title>Document</title>
</head>
<body>
  <div>
    <h1>02. 너비(width, height)</h1>
    <br />
    <div class="div-02">Hello</div>
    <br />
    <span class="span-02">Hello</span>
    <br />
    <br />
    <div class="parent-02">
      <div class="child-02"></div>
    </div>
  </div>

  <hr />

  <div>
    <h1>03. CSS 단위</h1>
    <br />
    <div class="parent-03">
      <div class="child-03"></div>
    </div>
  </div>

  <hr />

  <div>
    <h1>04. 외부 여백(margin)</h1>
    <br />
    <div class="container-04">
      <div class="item-04"></div>
      <div class="item-04"></div>
      <div class="item-04"></div>
    </div>
    <br />
    <br />
  </div>

  <hr />

  <div>
    <h1>05. 내부 여백(padding)</h1>
    <br />
    <div class="container-05">
      <div class="item-05"></div>
      <div class="item-05"></div>
    </div>
  </div>

  <hr />

  <div>
    <h1>06. 테두리 선(border)과 색상 표현</h1>
        <br />
    <div class="container-06">
      <div class="item-06"></div>
      <div class="item-06"></div>
    </div>
  </div>

  <hr />

  <div>
    <h1>07. 모서리 둥글게(border-radius)</h1>
    <br />
    <div class="div-07"></div>
  </div>

  <hr />

  <div>
    <h1>08. 크기 계산(box-sizing)</h1>
    <br />
    <div class="item-08">hello</div>
    <div class="item-08">hello</div>
  </div>

  <hr />

  <div>
    <h1>09. 넘침 제어(overflow)</h1>
    <div class="parent-09">
      <div class="child-09"></div>
    </div>
  </div>

  <hr />

  <div>
    <h1>10. 출력 특성(display)</h1>
    <div class="wrapper-10">
      <span class="span-10">Hello World!</span>
    </div>
  </div>

  <hr />

  <div>
    <h1>11. 투명도</h1>
    <div class="parent-11">
      <div class="child-11"></div>
    </div>
  </div>
</body>
</html>
