<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://unpkg.com/react@17/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <title>Document</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const rootElement = document.getElementById('root');

      const Id = ({ id, handleIdChange }) => {
        return (
          <>
            <label>ID: </label>
            <input value={id} onChange={handleIdChange} />
          </>
        );
      };

      const Password = ({ password, handlePasswordChange }) => {
        return (
          <>
            <label>PW: </label>
            <input
              type="password"
              value={password}
              onChange={handlePasswordChange}
            />
          </>
        );
      };

      const App = () => {
        const [id, setId] = React.useState('');
        const [password, setPassword] = React.useState('');

        const handleIdChange = (event) => {
          setId(event.target.value);
          console.log(`length: ${event.target.value.length > 0}`);
        };
        const handlePasswordChange = (event) => {
          setPassword(event.target.value);
          console.log(`length: ${event.target.value.length > 0}`);
        };
        const handleLoginClick = () => {};

        return (
          <>
            <Id id={id} handleIdChange={handleIdChange} />
            <br />
            <Password
              password={password}
              handlePasswordChange={handlePasswordChange}
            />
            <button
              disabled={id.length === 0 || password.length === 0}
              onClick={handleLoginClick}
            >
              Login
            </button>
          </>
        );
      };

      ReactDOM.render(<App />, rootElement);
    </script>
  </body>
</html>
